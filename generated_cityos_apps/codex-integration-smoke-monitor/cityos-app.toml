TarFile = "cityos-codex-integration-smoke-monitor.tar"
ImageName = "cityos-codex-integration-smoke-monitor"
ApiLevel = 2
Trusted = true
Persistent = true
StandbyPolicy = "none"

InputStreams = []

ExtraEnv = [
    "TRACEFIX_APP_KIND=monitor",
    "TRACEFIX_BUNDLE_DIR=/app/codex-integration-smoke-monitor/tracefix_bundle",
    "TRACEFIX_AUTORUN=0",
    "TRACEFIX_MODEL=",
    "TRACEFIX_OPENCODE_BIN=opencode",
    "TRACEFIX_TIMEOUT=600",
]

[OutputStreams.tracefix-monitor]
AllowedReaders = []
